<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergize — MTG Synergy Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
  }
  header h1 {
    font-size: 2rem;
    color: #c9a227;
    margin-bottom: 0.5rem;
  }
  header p { color: #888; font-size: 0.9rem; }
  #status {
    text-align: center;
    padding: 1rem;
    color: #aaa;
    font-size: 0.9rem;
  }
  #status.error { color: #e74c3c; }
  #status.ready { color: #2ecc71; }
  .search-area {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 1rem;
    position: relative;
    flex-wrap: wrap;
  }
  #card-input {
    width: 100%;
    padding: 0.8rem 1rem;
    font-size: 1.1rem;
    border: 2px solid #333;
    border-radius: 8px;
    background: #16213e;
    color: #e0e0e0;
    outline: none;
    transition: border-color 0.2s;
  }
  #card-input:focus, #max-cmc:focus { border-color: #c9a227; }
  #card-input:disabled { opacity: 0.5; }
  #max-cmc::placeholder { color: #666; font-size: 1.3rem; }
  #autocomplete {
    position: absolute;
    top: 100%;
    left: 1rem;
    right: 1rem;
    background: #16213e;
    border: 1px solid #333;
    border-top: none;
    border-radius: 0 0 8px 8px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 10;
    display: none;
  }
  #autocomplete div {
    padding: 0.5rem 1rem;
    cursor: pointer;
  }
  #autocomplete div:hover, #autocomplete div.selected {
    background: #1f3460;
    color: #c9a227;
  }
  .controls {
    max-width: 600px;
    margin: 0.5rem auto;
    padding: 0 1rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    justify-content: center;
  }
  .controls label { font-size: 0.85rem; color: #888; }
  .controls select, .controls input[type="checkbox"] {
    background: #16213e;
    color: #e0e0e0;
    border: 1px solid #333;
    padding: 0.3rem 0.5rem;
    border-radius: 4px;
  }
  #results-info {
    text-align: center;
    padding: 0.5rem 1rem;
    color: #888;
    font-size: 0.85rem;
  }
  #card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    padding: 1rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #16213e;
    transition: transform 0.15s;
    cursor: pointer;
  }
  .card:hover { transform: scale(1.05); z-index: 1; }
  .card img {
    width: 100%;
    display: block;
    border-radius: 12px;
  }
  .card .card-weight {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.8);
    color: #c9a227;
    font-weight: bold;
    font-size: 0.8rem;
    padding: 2px 8px;
    border-radius: 12px;
  }
  .card-flip-container {
    perspective: 600px;
    width: 100%;
    aspect-ratio: 488/680;
  }
  .card-flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.5s;
    transform-style: preserve-3d;
  }
  .card-flip-inner.flipped {
    transform: rotateY(180deg);
  }
  .card-flip-front, .card-flip-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    overflow: hidden;
  }
  .card-flip-back {
    transform: rotateY(180deg);
  }
  .card-flip-front img, .card-flip-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 12px;
  }
  .card-flip-btn {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #e0e0e0;
    border: 1px solid #555;
    border-radius: 10px;
    font-size: 0.65rem;
    padding: 1px 8px;
    cursor: pointer;
    z-index: 2;
    line-height: 1.4;
  }
  .card-flip-btn:hover {
    background: rgba(60,60,60,0.95);
    color: #c9a227;
  }
  .card .card-name-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 2rem 0.5rem 0.5rem;
    font-size: 0.75rem;
    display: none;
  }
  .card:hover .card-name-overlay { display: block; }
  .card .card-reasons {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.9);
    padding: 1rem;
    font-size: 0.7rem;
    overflow-y: auto;
    border-radius: 12px;
    color: #ccc;
  }
  .card .card-reasons.visible { display: block; }
  .card .card-reasons h4 { color: #c9a227; margin-bottom: 0.5rem; }
  .card .card-reasons ul { list-style: none; }
  .card .card-reasons li { margin-bottom: 0.2rem; color: #aaa; }
  .card .card-reasons li::before { content: "- "; color: #666; }
  .loading-placeholder {
    width: 100%;
    aspect-ratio: 488/680;
    background: #222;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<header>
  <h1>Synergize</h1>
  <p>Find the best synergy cards for your MTG Commander deck</p>
</header>
<nav style="text-align:center;padding:0.5rem;font-size:0.85rem"><b>Card Synergy Finder</b> | <a href="deck.html" style="color:#c9a227;text-decoration:none">Deck Builder</a></nav>

<div id="status">Loading graph data...</div>

<div class="search-area" style="display:flex;gap:0.5rem;align-items:stretch">
  <input type="text" id="card-input" placeholder="Type a card name..." disabled autocomplete="off" style="flex:1">
  <div style="position:relative;width:64px;flex-shrink:0">
    <input type="number" id="max-cmc" min="0" max="20" placeholder="&#8734;" title="Max CMC"
      style="width:100%;height:100%;padding:0.8rem 0.4rem;font-size:1.1rem;border:2px solid #333;border-radius:8px;background:#16213e;color:#e0e0e0;outline:none;text-align:center;transition:border-color 0.2s">
    <span style="position:absolute;top:-0.5rem;left:50%;transform:translateX(-50%);font-size:0.65rem;color:#666;background:#1a1a2e;padding:0 4px">CMC</span>
  </div>
  <div id="autocomplete"></div>
</div>

<div class="controls">
  <label>Show
    <select id="top-n">
      <option value="50">50</option>
      <option value="100" selected>100</option>
      <option value="150">150</option>
      <option value="200">200</option>
    </select>
    cards
  </label>
  <label>
    <input type="checkbox" id="as-commander" checked>
    Use as commander (demand boost)
  </label>
</div>

<div id="results-info"></div>
<div id="card-grid"></div>

<script type="module">
import init, { load_graph, graph_loaded, num_nodes, get_neighbors, search_cards } from './pkg/synergize.js';

// Fetch direct image URLs from Scryfall's /cards/collection endpoint (75 per batch).
// Images at cards.scryfall.io have no rate limit, only the API calls do.
const imageCache = new Map();

async function fetchImageUrls(names) {
  const uncached = names.filter(n => !imageCache.has(n));
  if (uncached.length === 0) return;

  // Batch into groups of 75
  for (let i = 0; i < uncached.length; i += 75) {
    const batch = uncached.slice(i, i + 75);
    try {
      const resp = await fetch('https://api.scryfall.com/cards/collection', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifiers: batch.map(name => ({ name })) }),
      });
      if (!resp.ok) continue;
      const data = await resp.json();
      for (const card of data.data || []) {
        const entry = {};
        if (card.image_uris) {
          entry.front = card.image_uris.normal;
        } else if (card.card_faces) {
          if (card.card_faces[0]?.image_uris) entry.front = card.card_faces[0].image_uris.normal;
          if (card.card_faces[1]?.image_uris) entry.back = card.card_faces[1].image_uris.normal;
        }
        // Cache under full name ("A // B") and each individual face name
        imageCache.set(card.name, entry);
        if (card.card_faces) {
          for (const face of card.card_faces) {
            imageCache.set(face.name, entry);
          }
        }
      }
    } catch (e) {
      console.warn('Scryfall batch fetch failed:', e);
    }
  }
}

function scryfallImgUrl(name, face) {
  const entry = imageCache.get(name);
  if (!entry) return null;
  return face === 'back' ? entry.back : entry.front;
}

let selectedIdx = -1;
let autocompleteItems = [];

async function main() {
  const statusEl = document.getElementById('status');
  const inputEl = document.getElementById('card-input');
  const acEl = document.getElementById('autocomplete');
  const gridEl = document.getElementById('card-grid');
  const infoEl = document.getElementById('results-info');
  const topNEl = document.getElementById('top-n');
  const asCommanderEl = document.getElementById('as-commander');
  const maxCmcEl = document.getElementById('max-cmc');

  // Init WASM
  statusEl.textContent = 'Initializing WASM...';
  await init();

  // Fetch graph binary
  statusEl.textContent = 'Downloading graph data (this may take a moment)...';
  let response;
  try {
    response = await fetch('synergize.bin');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
  } catch (e) {
    statusEl.textContent = `Failed to load graph: ${e.message}`;
    statusEl.className = 'error';
    return;
  }

  statusEl.textContent = 'Reading graph data...';
  const arrayBuf = await response.arrayBuffer();
  const data = new Uint8Array(arrayBuf);

  statusEl.textContent = `Loading graph (${(data.length / 1048576).toFixed(1)} MB)...`;
  try {
    load_graph(data);
  } catch (e) {
    statusEl.textContent = `Failed to parse graph: ${e}`;
    statusEl.className = 'error';
    return;
  }

  const n = num_nodes();
  statusEl.textContent = `Ready! ${n.toLocaleString()} cards loaded.`;
  statusEl.className = 'ready';
  inputEl.disabled = false;
  inputEl.focus();

  // Autocomplete
  let acTimeout;
  inputEl.addEventListener('input', () => {
    clearTimeout(acTimeout);
    selectedIdx = -1;
    const val = inputEl.value.trim();
    if (val.length < 2) {
      acEl.style.display = 'none';
      return;
    }
    acTimeout = setTimeout(() => {
      const json = search_cards(val, 15);
      autocompleteItems = JSON.parse(json);
      renderAutocomplete();
    }, 100);
  });

  function renderAutocomplete() {
    if (autocompleteItems.length === 0) {
      acEl.style.display = 'none';
      return;
    }
    acEl.innerHTML = '';
    autocompleteItems.forEach((name, i) => {
      const div = document.createElement('div');
      div.textContent = name;
      if (i === selectedIdx) div.classList.add('selected');
      div.addEventListener('mousedown', (e) => {
        e.preventDefault();
        selectCard(name);
      });
      acEl.appendChild(div);
    });
    acEl.style.display = 'block';
  }

  inputEl.addEventListener('keydown', (e) => {
    if (acEl.style.display === 'none') {
      if (e.key === 'Enter') {
        e.preventDefault();
        doSearch(inputEl.value.trim());
      }
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedIdx = Math.min(selectedIdx + 1, autocompleteItems.length - 1);
      renderAutocomplete();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedIdx = Math.max(selectedIdx - 1, -1);
      renderAutocomplete();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedIdx >= 0 && selectedIdx < autocompleteItems.length) {
        selectCard(autocompleteItems[selectedIdx]);
      } else {
        doSearch(inputEl.value.trim());
      }
    } else if (e.key === 'Escape') {
      acEl.style.display = 'none';
    }
  });

  inputEl.addEventListener('blur', () => {
    setTimeout(() => { acEl.style.display = 'none'; }, 200);
  });

  function selectCard(name) {
    inputEl.value = name;
    acEl.style.display = 'none';
    doSearch(name);
  }

  // Re-search when controls change
  topNEl.addEventListener('change', () => {
    if (inputEl.value.trim()) doSearch(inputEl.value.trim());
  });
  asCommanderEl.addEventListener('change', () => {
    if (inputEl.value.trim()) doSearch(inputEl.value.trim());
  });
  maxCmcEl.addEventListener('input', () => {
    if (inputEl.value.trim()) doSearch(inputEl.value.trim());
  });

  async function doSearch(cardName) {
    if (!cardName) return;
    const topN = parseInt(topNEl.value);
    const commander = asCommanderEl.checked ? cardName : null;

    const maxCmc = maxCmcEl.value !== '' ? parseInt(maxCmcEl.value) : -1;

    const t0 = performance.now();
    const json = get_neighbors(cardName, topN, commander, maxCmc);
    const elapsed = (performance.now() - t0).toFixed(1);
    let results = JSON.parse(json);

    if (results.length === 0) {
      infoEl.textContent = `No results for "${cardName}" (card not found or no synergies)`;
      gridEl.innerHTML = '';
      return;
    }

    const cmcLabel = maxCmc >= 0 ? ` (CMC ≤ ${maxCmc})` : '';
    infoEl.textContent = `Top ${results.length} synergies for "${cardName}"${cmcLabel} (${elapsed}ms)`;

    // Prefetch image URLs from Scryfall (2 API calls max for 100 cards)
    await fetchImageUrls(results.map(r => r.name));
    renderResults(results);
  }

  function setImgSrc(img, url) {
    img.loading = 'lazy';
    if (url) {
      img.src = url;
    } else {
      const ph = document.createElement('div');
      ph.className = 'loading-placeholder';
      ph.textContent = img.alt;
      img.replaceWith(ph);
    }
  }

  function renderResults(results) {
    gridEl.innerHTML = '';
    for (const r of results) {
      const card = document.createElement('div');
      card.className = 'card';
      const hasBack = !!r.back_face;

      // Weight badge
      const badge = document.createElement('div');
      badge.className = 'card-weight';
      badge.textContent = r.weight;

      if (hasBack) {
        // 3D flip card
        const container = document.createElement('div');
        container.className = 'card-flip-container';
        const inner = document.createElement('div');
        inner.className = 'card-flip-inner';

        const front = document.createElement('div');
        front.className = 'card-flip-front';
        const frontImg = document.createElement('img');
        frontImg.alt = r.name;
        frontImg.loading = 'lazy';
        setImgSrc(frontImg, scryfallImgUrl(r.name, 'front'));
        front.appendChild(frontImg);

        const back = document.createElement('div');
        back.className = 'card-flip-back';
        const backImg = document.createElement('img');
        backImg.alt = r.back_face;
        backImg.loading = 'lazy';
        setImgSrc(backImg, scryfallImgUrl(r.name, 'back'));
        back.appendChild(backImg);

        inner.appendChild(front);
        inner.appendChild(back);
        container.appendChild(inner);
        card.appendChild(container);

        const flipBtn = document.createElement('button');
        flipBtn.className = 'card-flip-btn';
        flipBtn.textContent = '\u21BB';
        flipBtn.title = `Flip to ${r.back_face}`;
        flipBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          inner.classList.toggle('flipped');
          flipBtn.title = inner.classList.contains('flipped')
            ? `Flip to ${r.name}` : `Flip to ${r.back_face}`;
        });
        card.appendChild(flipBtn);
      } else {
        // Standard single-face card
        const img = document.createElement('img');
        img.alt = r.name;
        img.loading = 'lazy';
        setImgSrc(img, scryfallImgUrl(r.name));
        card.appendChild(img);
      }

      // Reasons overlay (click to toggle)
      const reasons = document.createElement('div');
      reasons.className = 'card-reasons';
      reasons.innerHTML = `<h4>${escapeHtml(r.name)} (${r.weight})</h4><ul>${
        r.reasons.map(reason => `<li>${escapeHtml(reason)}</li>`).join('')
      }</ul>`;

      card.addEventListener('click', () => {
        reasons.classList.toggle('visible');
      });

      card.appendChild(badge);
      card.appendChild(reasons);
      gridEl.appendChild(card);
    }
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
}

main().catch(e => {
  document.getElementById('status').textContent = `Error: ${e}`;
  document.getElementById('status').className = 'error';
  console.error(e);
});
</script>

</body>
</html>
