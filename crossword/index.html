<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Next Letter</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap");

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            :root {
                --bg: #f4f1ec;
                --surface: #ffffff;
                --ink: #1a1a1a;
                --muted: #8a8580;
                --border: #e2ddd6;
                --cell-empty: #e8e4dc;
                --cell-hover: #dbd6cc;
                --cell-block: #1a1a1a;
                --cell-clue-bg: #efe9df;
                --cell-played-bg: #ffffff;
                --letter-tile: #1a1a1a;
                --accent: #c24040;
                --good: #2a9968;
            }
            html, body { height: 100%; overflow: hidden; }
            body {
                font-family: "DM Mono", monospace;
                background: var(--bg);
                color: var(--ink);
                display: flex;
                justify-content: center;
            }
            .app {
                width: 100%; height: 100%;
                max-width: 640px;
                display: flex; flex-direction: column;
                padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
            }

            .top-bar {
                display: flex; align-items: center; justify-content: space-between;
                padding: 8px 0 12px;
                flex-shrink: 0;
            }
            .title {
                font-size: 14px; letter-spacing: 0.16em; text-transform: uppercase;
                color: var(--muted);
            }
            .lives {
                display: flex; gap: 6px; align-items: center;
            }
            .heart {
                width: 14px; height: 14px;
                background: var(--accent);
                clip-path: path("M7 12.5 C 1 8, 0 4, 3 2 C 5 1, 6 2, 7 4 C 8 2, 9 1, 11 2 C 14 4, 13 8, 7 12.5 Z");
                transition: opacity 0.2s, transform 0.2s;
            }
            .heart.lost { opacity: 0.18; transform: scale(0.8); }
            .btn {
                font-family: "DM Mono", monospace;
                font-size: 13px; padding: 9px 14px;
                border-radius: 9px; border: 1.5px solid var(--border);
                background: var(--surface); color: var(--ink); cursor: pointer;
                letter-spacing: 0.02em;
            }
            .btn:active { transform: scale(0.97); }
            .size-toggle {
                display: flex; gap: 0; border: 1.5px solid var(--border);
                border-radius: 9px; overflow: hidden;
            }
            .size-btn {
                font-family: "DM Mono", monospace;
                font-size: 12px; padding: 7px 10px;
                background: var(--surface); color: var(--muted); cursor: pointer;
                border: 0; letter-spacing: 0.04em;
                -webkit-tap-highlight-color: transparent;
            }
            .size-btn.active { background: var(--ink); color: #fff; }
            .size-btn:active { transform: scale(0.95); }

            .grid-area {
                flex: 1; display: flex; align-items: center; justify-content: center;
                overflow: hidden; min-height: 0;
            }
            .grid {
                position: relative;
                /* width / height set in JS */
            }

            .cell {
                position: absolute;
                border-radius: 9px;
                background: var(--cell-empty);
                display: flex; align-items: center; justify-content: center;
                font-weight: 500;
                color: var(--ink);
                transition: background 0.12s, transform 0.1s, box-shadow 0.12s, color 0.12s;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }
            .cell.is-empty.is-tappable { cursor: pointer; }
            .cell.is-empty.is-tappable:hover { background: var(--cell-hover); }
            .cell.is-empty.is-tappable:active { transform: scale(0.94); }
            .cell.is-empty.is-locked {
                cursor: default;
                background-image:
                    repeating-linear-gradient(
                        45deg,
                        transparent,
                        transparent 5px,
                        rgba(0, 0, 0, 0.08) 5px,
                        rgba(0, 0, 0, 0.08) 10px
                    );
            }
            .cell.is-block {
                background: transparent;
                cursor: default;
                pointer-events: none;
            }
            .cell.is-clue {
                background: var(--cell-clue-bg);
                color: var(--muted);
                cursor: default;
            }
            .cell.is-played {
                background: var(--cell-played-bg);
                color: var(--ink);
                box-shadow: inset 0 0 0 1.5px var(--border);
            }
            .cell.is-revealed-debug {
                background: #fef3e1;
                color: var(--accent);
                box-shadow: inset 0 0 0 1.5px var(--accent);
            }
            .cell.is-target-debug {
                box-shadow: inset 0 0 0 3px var(--good);
            }
            .cell.flash-good {
                animation: pop 0.42s ease;
            }
            .cell.flash-bad {
                animation: shake 0.5s ease;
                background: var(--accent);
                color: #fff;
            }
            @keyframes pop {
                0%   { transform: scale(0.6); }
                60%  { transform: scale(1.08); }
                100% { transform: scale(1); }
            }
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20%      { transform: translateX(-5px); }
                40%      { transform: translateX(5px); }
                60%      { transform: translateX(-3px); }
                80%      { transform: translateX(3px); }
            }

            .bottom-bar {
                flex-shrink: 0;
                display: flex; flex-direction: column; align-items: center;
                gap: 10px;
                padding: 14px 0 4px;
            }
            .served-label {
                font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
                color: var(--muted);
            }
            .served-tile {
                width: 92px; height: 92px;
                background: var(--letter-tile);
                color: #fff;
                border-radius: 18px;
                display: flex; align-items: center; justify-content: center;
                font-size: 56px; font-weight: 500;
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
                text-transform: uppercase;
                transition: transform 0.18s, background 0.2s;
            }
            .served-tile.is-empty {
                background: var(--cell-empty); color: var(--muted);
                box-shadow: none;
            }
            .progress {
                font-size: 12px; color: var(--muted); letter-spacing: 0.06em;
            }

            .overlay {
                position: absolute; inset: 0;
                background: rgba(244, 241, 236, 0.92);
                display: none; align-items: center; justify-content: center;
                pointer-events: none;
                z-index: 10;
            }
            .overlay.show { display: flex; pointer-events: auto; }
            .overlay-card {
                background: var(--surface);
                border: 1.5px solid var(--border);
                border-radius: 14px;
                padding: 28px 32px;
                text-align: center;
                box-shadow: 0 14px 36px rgba(0, 0, 0, 0.10);
                display: flex; flex-direction: column; gap: 14px; align-items: center;
            }
            .overlay-headline {
                font-size: 22px; font-weight: 500; letter-spacing: 0.04em;
            }
            .overlay-sub {
                font-size: 13px; color: var(--muted);
            }
            .overlay-card .btn {
                margin-top: 6px;
                font-size: 14px;
                padding: 10px 20px;
            }
        </style>
    </head>
    <body>
        <div class="app">
            <div class="top-bar">
                <div class="title">Next Letter</div>
                <div class="lives" id="lives"></div>
                <div class="size-toggle" id="size-toggle">
                    <button class="size-btn" data-size="4">4×4</button>
                    <button class="size-btn active" data-size="5">5×5</button>
                    <button class="size-btn" data-size="6">6×6</button>
                </div>
                <button class="btn" id="new-btn">New</button>
            </div>
            <div class="grid-area">
                <div class="grid" id="grid"></div>
            </div>
            <div class="bottom-bar">
                <div class="served-label">Tap where this goes</div>
                <div class="served-tile" id="served">—</div>
                <div class="progress" id="progress">0 / 0</div>
            </div>
            <div class="overlay" id="overlay">
                <div class="overlay-card">
                    <div class="overlay-headline" id="overlay-head">—</div>
                    <div class="overlay-sub" id="overlay-sub">—</div>
                    <button class="btn" id="overlay-btn">New puzzle</button>
                </div>
            </div>
        </div>

        <script type="module">
            import init, { CrosswordGame } from "./engine/pkg/crossword_engine.js";

            const gridEl = document.getElementById("grid");
            const servedEl = document.getElementById("served");
            const livesEl = document.getElementById("lives");
            const progressEl = document.getElementById("progress");
            const newBtn = document.getElementById("new-btn");
            const overlay = document.getElementById("overlay");
            const overlayHead = document.getElementById("overlay-head");
            const overlaySub = document.getElementById("overlay-sub");
            const overlayBtn = document.getElementById("overlay-btn");

            let game = null;
            let cellEls = [];

            let currentSeed = null;
            let puzzleIndex = 1;
            let currentSize = 5;

            async function loadDailyPuzzle(index) {
                const path = `puzzles/${String(index).padStart(4, "0")}.json`;
                try {
                    const resp = await fetch(path);
                    if (!resp.ok) return null;
                    const data = await resp.json();
                    const rows = data.rows;
                    const cols = data.cols;
                    // solution: array of row strings; flatten to bytes
                    const solBytes = new Uint8Array(rows * cols);
                    for (let r = 0; r < rows; r++) {
                        const line = data.solution[r];
                        for (let c = 0; c < cols; c++) {
                            solBytes[r * cols + c] = line.charCodeAt(c);
                        }
                    }
                    const cluesFlat = new Uint8Array(rows * cols);
                    for (const idx of data.clues) cluesFlat[idx] = 1;
                    const serve = new Uint32Array(data.serve_order);
                    const g = CrosswordGame.from_data(rows, cols, solBytes, cluesFlat, serve);
                    if (g) {
                        currentSeed = data.seed;
                        return g;
                    }
                } catch (_) {
                    // fall through to runtime gen
                }
                return null;
            }

            async function newGame() {
                // For runtime gen, use the size-specific constructor.
                let g = null;
                const seed = BigInt(Math.floor(Math.random() * 2 ** 53) || 1);
                let attempt = seed;
                let usedSeed = null;
                const ctor = currentSize === 4
                    ? CrosswordGame.from_seed_4x4
                    : currentSize === 6
                        ? CrosswordGame.from_seed_6x6
                        : CrosswordGame.from_seed_5x5;
                for (let i = 0; i < 6 && !g; i++) {
                    g = ctor(attempt);
                    if (g) usedSeed = attempt;
                    attempt = attempt + 1n;
                }
                currentSeed = usedSeed;
                if (!g) {
                    overlay.classList.add("show");
                    overlayHead.textContent = "Generation failed";
                    overlaySub.textContent = "Try again.";
                    return;
                }
                if (game) game.free?.();
                game = g;
                buildGrid();
                refresh();
                overlay.classList.remove("show");
                logPuzzleStart();
            }

            function gridLines(getter) {
                const rows = game.rows();
                const cols = game.cols();
                const lines = [];
                for (let r = 0; r < rows; r++) {
                    const row = [];
                    for (let c = 0; c < cols; c++) {
                        row.push(getter(r, c));
                    }
                    lines.push(row.join(" "));
                }
                return lines.join("\n");
            }

            function logPuzzleStart() {
                const rows = game.rows();
                const cols = game.cols();
                const solution = gridLines((r, c) => {
                    const k = game.cell_kind(r, c);
                    if (k === 0) return "█";
                    return String.fromCharCode(game.solution_letter(r, c)).toUpperCase();
                });
                const initial = gridLines((r, c) => {
                    const k = game.cell_kind(r, c);
                    if (k === 0) return "█";
                    if (k === 2) return String.fromCharCode(game.solution_letter(r, c)).toUpperCase();
                    return ".";
                });
                const order = [];
                for (let i = 0; i < game.total_to_serve(); i++) {
                    const idx = game.serve_cell(i);
                    const r = Math.floor(idx / cols);
                    const c = idx % cols;
                    const letter = String.fromCharCode(game.serve_letter(i)).toUpperCase();
                    order.push(`  ${(i + 1).toString().padStart(2)}: (${r},${c}) -> ${letter}`);
                }
                console.log(
                    `[crossword] new puzzle (seed ${currentSeed})\n` +
                    `solution:\n${solution}\n\n` +
                    `initial (clues only):\n${initial}\n\n` +
                    `serve order:\n${order.join("\n")}`
                );
            }

            function logPuzzleEnd(outcome) {
                const cols = game.cols();
                const remainingSteps = [];
                for (let i = game.served_count(); i < game.total_to_serve(); i++) {
                    const idx = game.serve_cell(i);
                    const r = Math.floor(idx / cols);
                    const c = idx % cols;
                    const letter = String.fromCharCode(game.serve_letter(i)).toUpperCase();
                    remainingSteps.push(`  ${(i + 1).toString().padStart(2)}: (${r},${c}) -> ${letter}`);
                }
                console.log(
                    `[crossword] ${outcome} (seed ${currentSeed}) — mistakes ${game.mistakes()}/${game.max_mistakes()}\n` +
                    `remaining serve order:\n${remainingSteps.join("\n") || "  (none)"}`
                );
            }

            function buildGrid() {
                gridEl.innerHTML = "";
                cellEls = [];
                const rows = game.rows();
                const cols = game.cols();
                const area = document.querySelector(".grid-area");
                const maxW = Math.min(area.clientWidth, area.clientHeight);
                const gap = 6;
                const cellSize = Math.floor((maxW - gap * (cols + 1)) / cols);
                const total = cellSize * cols + gap * (cols + 1);
                gridEl.style.width = total + "px";
                gridEl.style.height = (cellSize * rows + gap * (rows + 1)) + "px";

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const div = document.createElement("div");
                        div.className = "cell";
                        div.style.width = cellSize + "px";
                        div.style.height = cellSize + "px";
                        div.style.left = (gap + c * (cellSize + gap)) + "px";
                        div.style.top = (gap + r * (cellSize + gap)) + "px";
                        div.style.fontSize = Math.floor(cellSize * 0.5) + "px";
                        div.dataset.r = r;
                        div.dataset.c = c;
                        div.addEventListener("click", () => onTap(r, c));
                        gridEl.appendChild(div);
                        cellEls.push(div);
                    }
                }
            }

            function cellEl(r, c) {
                return cellEls[r * game.cols() + c];
            }

            function refresh() {
                const rows = game.rows();
                const cols = game.cols();
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const el = cellEl(r, c);
                        const kind = game.cell_kind(r, c);
                        const letter = game.cell_letter(r, c);
                        el.classList.remove("is-block", "is-empty", "is-clue", "is-played", "is-tappable", "is-locked");
                        if (kind === 0) {
                            el.classList.add("is-block");
                            el.textContent = "";
                        } else if (kind === 1) {
                            el.classList.add("is-empty");
                            el.classList.add(game.is_tappable(r, c) ? "is-tappable" : "is-locked");
                            el.textContent = "";
                        } else if (kind === 2) {
                            el.classList.add("is-clue");
                            el.textContent = String.fromCharCode(letter).toUpperCase();
                        } else {
                            el.classList.add("is-played");
                            el.textContent = String.fromCharCode(letter).toUpperCase();
                        }
                    }
                }

                const cur = game.current_letter();
                if (cur === 0) {
                    servedEl.textContent = "—";
                    servedEl.classList.add("is-empty");
                } else {
                    servedEl.textContent = String.fromCharCode(cur).toUpperCase();
                    servedEl.classList.remove("is-empty");
                }

                const max = game.max_mistakes();
                const used = game.mistakes();
                livesEl.innerHTML = "";
                for (let i = 0; i < max; i++) {
                    const h = document.createElement("div");
                    h.className = "heart" + (i < used ? " lost" : "");
                    livesEl.appendChild(h);
                }
                progressEl.textContent = `${game.served_count()} / ${game.total_to_serve()}`;

                if (game.is_won()) {
                    overlay.classList.add("show");
                    overlayHead.textContent = "Solved";
                    overlaySub.textContent = `${game.mistakes()} mistake${game.mistakes() === 1 ? "" : "s"}`;
                    if (!winLogged) { logPuzzleEnd("WON"); winLogged = true; }
                } else if (game.is_lost()) {
                    revealSolutionDebug();
                    overlay.classList.add("show");
                    overlayHead.textContent = "Out of tries";
                    overlaySub.textContent = `${game.served_count()} of ${game.total_to_serve()} placed (debug: full board revealed)`;
                    if (!loseLogged) { logPuzzleEnd("LOST"); loseLogged = true; }
                } else {
                    overlay.classList.remove("show");
                }
            }

            let winLogged = false;
            let loseLogged = false;

            function revealSolutionDebug() {
                const rows = game.rows();
                const cols = game.cols();
                const targetIdx = game.is_lost() ? game.serve_cell(game.served_count()) : -1;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const el = cellEl(r, c);
                        const k = game.cell_kind(r, c);
                        if (k === 0) continue;
                        if (k === 1) {
                            // hidden — show the solution in debug style
                            el.classList.remove("is-empty");
                            el.classList.add("is-revealed-debug");
                            const letter = game.solution_letter(r, c);
                            el.textContent = String.fromCharCode(letter).toUpperCase();
                        }
                        const idx = r * cols + c;
                        if (idx === targetIdx) {
                            el.classList.add("is-target-debug");
                        }
                    }
                }
            }

            function onTap(r, c) {
                if (!game || game.is_won() || game.is_lost()) return;
                if (game.cell_kind(r, c) !== 1) return;
                if (!game.is_tappable(r, c)) return;
                const result = game.tap(r, c);
                const el = cellEl(r, c);
                if (result === 0 || result === 2) {
                    el.classList.add("flash-good");
                    setTimeout(() => el.classList.remove("flash-good"), 420);
                } else if (result === 1 || result === 3) {
                    el.classList.add("flash-bad");
                    setTimeout(() => el.classList.remove("flash-bad"), 500);
                }
                refresh();
            }

            window.addEventListener("resize", () => {
                if (game) {
                    buildGrid();
                    refresh();
                    if (game.is_lost()) revealSolutionDebug();
                }
            });

            function reset() {
                winLogged = false;
                loseLogged = false;
                newGame();
            }
            newBtn.addEventListener("click", reset);
            overlayBtn.addEventListener("click", reset);

            document.querySelectorAll(".size-btn").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const newSize = parseInt(btn.dataset.size);
                    if (newSize === currentSize) return;
                    currentSize = newSize;
                    document.querySelectorAll(".size-btn").forEach((b) => {
                        b.classList.toggle("active", parseInt(b.dataset.size) === currentSize);
                    });
                    reset();
                });
            });

            await init();
            reset();
        </script>
    </body>
</html>
