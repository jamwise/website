<!doctype html>
<html lang="en" data-theme="a">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Newel</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap");

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            /* Palette A — Studio Linen (default). Scrabble-tile aesthetic:
               pale birch/ivory wood with organic grain texture (SVG noise),
               beveled edge, recessed empty board squares. */
            :root,
            [data-theme="a"] {
                --bg: #ffffff;
                --surface: #fbf8f2;
                --ink: #2a2218;
                --muted: #7a7468;
                --border: #ddd6c8;
                --cell-empty: #f6f6f6;
                --cell-hover: #ebebeb;
                --cell-clue-bg: #f4efe4;
                --cell-played-bg: #fbf8ef;
                --cell-block: #2c3a3f;
                --letter-tile: #0f766e;
                --letter-tile-fg: #fbf8f2;
                --accent: #b5532e;
                --good: #5b8c5a;
                --stripe: rgba(0, 0, 0, 0.05);
                --shadow-card: rgba(31, 42, 46, 0.1);

                --tile-edge: #dcd2bb;

                /* Shape & elevation tokens */
                --cell-radius: 8px;
                --cell-shadow: inset 0 2px 4px rgba(42, 34, 24, 0.1);
                --cell-played-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.55), inset 0 -1px 0 rgba(42, 34, 24, 0.06),
                    0 3px 0 var(--tile-edge), 0 5px 9px rgba(42, 34, 24, 0.18);
                --cell-clue-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.4), inset 0 -1px 0 rgba(42, 34, 24, 0.08),
                    0 2px 0 var(--tile-edge), 0 4px 7px rgba(42, 34, 24, 0.15);
                --cell-active-transform: translateY(2px);
                --tile-radius: 20px;
                --tile-shadow: 0 8px 22px rgba(15, 118, 110, 0.22);
                --tile-font: "Fraunces", Georgia, serif;
                --tile-weight: 600;
            }

            /* Palette B — Terra & Teal. Tactile pillowy. */
            [data-theme="b"] {
                --bg: #f4ecdd;
                --surface: #fff8eb;
                --ink: #2a1f1a;
                --muted: #8b7563;
                --border: #e5d6bd;
                --cell-empty: #eadbc2;
                --cell-hover: #dcc8a2;
                --cell-clue-bg: #e0c9a4;
                --cell-played-bg: #fff8eb;
                --cell-block: #3e2c24;
                --letter-tile: #127475;
                --letter-tile-fg: #fff8eb;
                --accent: #c2552b;
                --good: #6a8e3f;
                --stripe: rgba(42, 31, 26, 0.1);
                --shadow-card: rgba(42, 31, 26, 0.1);

                --cell-radius: 14px;
                --cell-shadow: 0 1px 2px rgba(42, 31, 26, 0.05);
                --cell-played-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.55), 0 3px 8px rgba(42, 31, 26, 0.1);
                --cell-clue-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
                --cell-active-transform: scale(0.92);
                --tile-radius: 26px;
                --tile-shadow:
                    0 10px 28px rgba(18, 116, 117, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.18);
                --tile-font: "Fraunces", Georgia, serif;
                --tile-weight: 600;
            }

            /* Palette C — Paper & Plum. Brutalist sharp. */
            [data-theme="c"] {
                --bg: #f5f0e8;
                --surface: #fffdf8;
                --ink: #241b2f;
                --muted: #7c6f87;
                --border: #c5bace;
                --cell-empty: #ece4ec;
                --cell-hover: #dcc9d8;
                --cell-clue-bg: #dcc9d8;
                --cell-played-bg: #fffdf8;
                --cell-block: #3d2a4a;
                --letter-tile: #c9763b;
                --letter-tile-fg: #fffdf8;
                --accent: #a23e5c;
                --good: #3f7a5b;
                --stripe: rgba(36, 27, 47, 0.1);
                --shadow-card: rgba(36, 27, 47, 0.1);

                --cell-radius: 4px;
                --cell-shadow: none;
                --cell-played-shadow:
                    3px 3px 0 var(--cell-block), inset 0 0 0 1.5px var(--cell-block);
                --cell-clue-shadow: inset 0 0 0 1.5px var(--cell-block);
                --cell-active-transform: translate(3px, 3px);
                --tile-radius: 8px;
                --tile-shadow: 5px 5px 0 var(--ink);
                --tile-font: "Fraunces", Georgia, serif;
                --tile-weight: 700;
            }

            /* Palette D — Quiet Inkwell. Neon glow. */
            [data-theme="d"] {
                --bg: #10171c;
                --surface: #1a242b;
                --ink: #efe9dc;
                --muted: #8a95a0;
                --border: #243038;
                --cell-empty: #1f2a33;
                --cell-hover: #2b3944;
                --cell-clue-bg: #2a3947;
                --cell-played-bg: #243038;
                --cell-block: #0a1014;
                --letter-tile: #f5b14a;
                --letter-tile-fg: #10171c;
                --accent: #e07a5f;
                --good: #7bc49a;
                --stripe: rgba(255, 255, 255, 0.06);
                --shadow-card: rgba(0, 0, 0, 0.4);

                --cell-radius: 6px;
                --cell-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
                --cell-played-shadow:
                    inset 0 0 0 1px rgba(245, 177, 74, 0.45), 0 0 18px rgba(245, 177, 74, 0.18);
                --cell-clue-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
                --cell-active-transform: scale(0.94);
                --tile-radius: 14px;
                --tile-shadow:
                    0 0 32px rgba(245, 177, 74, 0.45), 0 0 0 1px rgba(245, 177, 74, 0.45);
                --tile-font: "Inter", sans-serif;
                --tile-weight: 700;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
            }
            body {
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: var(--bg);
                color: var(--ink);
                display: flex;
                justify-content: center;
                transition:
                    background 0.2s,
                    color 0.2s;
            }
            .app {
                width: 100%;
                height: 100%;
                max-width: 640px;
                display: flex;
                flex-direction: column;
                padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
            }

            .top-bar {
                display: grid;
                grid-template-columns: 1fr auto 1fr;
                align-items: start;
                padding: 12px 0 14px;
                flex-shrink: 0;
            }
            .top-bar .title {
                justify-self: start;
                align-self: start;
                padding-top: 6px;
            }
            .top-bar .lives {
                justify-self: end;
                align-self: start;
                padding-top: 10px;
            }
            .next-section {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                justify-self: center;
            }
            .title {
                font-family: "Fraunces", Georgia, serif;
                font-size: 22px;
                font-weight: 600;
                letter-spacing: -0.01em;
                color: var(--ink);
                font-variation-settings: "opsz" 60;
            }
            .lives {
                display: flex;
                gap: 6px;
                align-items: center;
            }
            .heart {
                width: 14px;
                height: 14px;
                background: var(--accent);
                clip-path: path(
                    "M7 12.5 C 1 8, 0 4, 3 2 C 5 1, 6 2, 7 4 C 8 2, 9 1, 11 2 C 14 4, 13 8, 7 12.5 Z"
                );
                transition:
                    opacity 0.2s,
                    transform 0.2s,
                    background 0.2s;
            }
            .heart.lost {
                opacity: 0.18;
                transform: scale(0.8);
            }
            .btn {
                font-family: "Inter", sans-serif;
                font-size: 13px;
                padding: 9px 14px;
                font-weight: 500;
                border-radius: 9px;
                border: 1.5px solid var(--border);
                background: var(--surface);
                color: var(--ink);
                cursor: pointer;
                letter-spacing: 0;
                transition:
                    background 0.15s,
                    border-color 0.15s,
                    color 0.15s,
                    transform 0.1s;
            }
            .btn:hover {
                border-color: var(--ink);
            }
            .btn:active {
                transform: scale(0.97);
            }

            .grid-area {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                min-height: 0;
                position: relative;
            }
            .grid {
                position: relative;
                /* width / height set in JS */
                transition: opacity 0.15s;
            }
            .grid.is-loading {
                opacity: 0.25;
                pointer-events: none;
            }
            .spinner {
                position: absolute;
                display: none;
                flex-direction: column;
                align-items: center;
                gap: 14px;
            }
            .spinner.show {
                display: flex;
            }
            .loader-grid {
                display: grid;
                grid-template-columns: repeat(5, 12px);
                grid-template-rows: repeat(5, 12px);
                gap: 3px;
            }
            .loader-cell {
                background: var(--ink);
                border-radius: 2px;
                transform: scale(0.4);
                opacity: 0.3;
                animation: ripple 1500ms infinite ease-in-out;
            }
            /* (0,0) and (4,4) sit empty — match Newel's blocked-corner aesthetic. */
            .loader-cell:nth-child(1),
            .loader-cell:nth-child(25) {
                animation: none;
                visibility: hidden;
            }
            @keyframes ripple {
                0%,
                50%,
                100% {
                    transform: scale(0.4);
                    opacity: 0.3;
                }
                20% {
                    transform: scale(1);
                    opacity: 1;
                }
            }
            /* Diagonal stagger: delay = 500ms * ((r+c)/8)^1.2 */
            .loader-cell:nth-child(1) {
                animation-delay: 0ms;
            }
            .loader-cell:nth-child(2) {
                animation-delay: 42ms;
            }
            .loader-cell:nth-child(3) {
                animation-delay: 94ms;
            }
            .loader-cell:nth-child(4) {
                animation-delay: 155ms;
            }
            .loader-cell:nth-child(5) {
                animation-delay: 218ms;
            }
            .loader-cell:nth-child(6) {
                animation-delay: 42ms;
            }
            .loader-cell:nth-child(7) {
                animation-delay: 94ms;
            }
            .loader-cell:nth-child(8) {
                animation-delay: 155ms;
            }
            .loader-cell:nth-child(9) {
                animation-delay: 218ms;
            }
            .loader-cell:nth-child(10) {
                animation-delay: 283ms;
            }
            .loader-cell:nth-child(11) {
                animation-delay: 94ms;
            }
            .loader-cell:nth-child(12) {
                animation-delay: 155ms;
            }
            .loader-cell:nth-child(13) {
                animation-delay: 218ms;
            }
            .loader-cell:nth-child(14) {
                animation-delay: 283ms;
            }
            .loader-cell:nth-child(15) {
                animation-delay: 350ms;
            }
            .loader-cell:nth-child(16) {
                animation-delay: 155ms;
            }
            .loader-cell:nth-child(17) {
                animation-delay: 218ms;
            }
            .loader-cell:nth-child(18) {
                animation-delay: 283ms;
            }
            .loader-cell:nth-child(19) {
                animation-delay: 350ms;
            }
            .loader-cell:nth-child(20) {
                animation-delay: 424ms;
            }
            .loader-cell:nth-child(21) {
                animation-delay: 218ms;
            }
            .loader-cell:nth-child(22) {
                animation-delay: 283ms;
            }
            .loader-cell:nth-child(23) {
                animation-delay: 350ms;
            }
            .loader-cell:nth-child(24) {
                animation-delay: 424ms;
            }
            .loader-cell:nth-child(25) {
                animation-delay: 500ms;
            }
            .loader-text {
                font-size: 11px;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--muted);
            }

            .cell {
                position: absolute;
                border-radius: var(--cell-radius);
                background: var(--cell-empty);
                box-shadow: var(--cell-shadow);
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 600;
                color: var(--ink);
                transition:
                    background 0.18s,
                    box-shadow 0.2s,
                    color 0.18s,
                    border-radius 0.2s;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }
            .cell.is-empty.is-tappable {
                cursor: pointer;
            }
            .cell.is-empty.is-tappable:hover {
                background: var(--cell-hover);
            }
            .cell.is-empty.is-tappable:active {
                transform: var(--cell-active-transform);
                box-shadow: none;
            }
            .cell.is-empty.is-locked {
                cursor: default;
                background-image: repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 5px,
                    var(--stripe) 5px,
                    var(--stripe) 10px
                );
            }
            .cell.is-block {
                background: var(--cell-block);
                cursor: default;
                pointer-events: none;
            }
            .cell.is-clue {
                background: var(--cell-clue-bg);
                color: var(--muted);
                cursor: default;
                box-shadow: var(--cell-clue-shadow);
            }
            .cell.is-played {
                background: var(--cell-played-bg);
                color: var(--ink);
                box-shadow: var(--cell-played-shadow);
            }

            /* Theme A: Scrabble-tile treatment.
               Pale birch/ivory wood with subtle warm dapples + organic grain
               from SVG fractal noise (anisotropic baseFrequency for streaks
               that flow rather than tile in straight lines). */
            [data-theme="a"] .cell.is-played,
            [data-theme="a"] .cell.is-clue {
                color: var(--ink);
                font-family: "Inter", system-ui, sans-serif;
                font-weight: 700;
                letter-spacing: -0.02em;
                /* Carved-into-wood: hard bright highlight on the
                   bottom-right edges + sharp dark top-left edge, plus a
                   tight 2px blur hugging the sharp shadow for a hint of
                   depth without spreading. */
                text-shadow:
                    /* Bottom-right lit edges */
                    0 1px 0 rgba(255, 250, 235, 0.85),
                    1px 1px 0 rgba(255, 250, 235, 0.45),
                    /* Top-left shadow edges */ 0 -1px 0 rgba(50, 30, 12, 0.55),
                    -1px -1px 0 rgba(50, 30, 12, 0.4),
                    /* Tight inner-depth blur, hugging the shadow */ 0 -1px 2px
                        rgba(50, 30, 12, 0.3),
                    -1px -1px 2px rgba(50, 30, 12, 0.2);
                background-image:
                    /* Cool soft highlight upper-left */
                    radial-gradient(
                        ellipse 60% 50% at 25% 22%,
                        rgba(255, 250, 235, 0.16),
                        transparent 65%
                    ),
                    /* Subtle dapple lower-right */
                    radial-gradient(
                            ellipse 50% 40% at 78% 75%,
                            rgba(110, 95, 70, 0.04),
                            transparent 60%
                        ),
                    /* Tiny knot */
                    radial-gradient(circle 3px at 62% 60%, rgba(85, 65, 40, 0.1), transparent 75%),
                    /* Organic grain — fractalNoise, low alpha so the lighter
                       tile base shows through. */
                    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200' preserveAspectRatio='none'><filter id='w'><feTurbulence type='fractalNoise' baseFrequency='0.018 0.32' numOctaves='2' seed='12' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.50  0 0 0 0 0.43  0 0 0 0 0.34  0.40 0 0 0 0'/></filter><rect width='100%25' height='100%25' filter='url(%23w)'/></svg>");
                background-size:
                    auto,
                    auto,
                    auto,
                    130px 130px;
                background-repeat: no-repeat, no-repeat, no-repeat, repeat;
            }
            [data-theme="a"] .cell.is-played {
                background-color: var(--cell-played-bg);
            }
            [data-theme="a"] .cell.is-clue {
                background-color: var(--cell-clue-bg);
                opacity: 0.93;
            }
            [data-theme="a"] .cell.is-block {
                background: transparent;
                box-shadow: none;
            }
            .cell.is-revealed-debug {
                background: #fef3e1;
                color: var(--accent);
                box-shadow: inset 0 0 0 1.5px var(--accent);
            }
            .cell.is-wrong {
                pointer-events: none;
                cursor: default;
                color: var(--accent);
                background: var(--cell-empty);
                opacity: 0.7;
            }
            .cell.is-target-debug {
                box-shadow: inset 0 0 0 3px var(--good);
            }
            .cell.flash-good {
                animation: pop 0.22s ease-out;
            }
            .cell.flash-bad {
                animation: shake 0.5s ease;
                background: var(--accent);
                color: #fff;
            }
            @keyframes pop {
                0% {
                    transform: scale(0.85);
                }
                55% {
                    transform: scale(1.04);
                }
                100% {
                    transform: scale(1);
                }
            }
            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                20% {
                    transform: translateX(-5px);
                }
                40% {
                    transform: translateX(5px);
                }
                60% {
                    transform: translateX(-3px);
                }
                80% {
                    transform: translateX(3px);
                }
            }

            .bottom-bar {
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                padding: 0 0 8px;
                min-height: 118px;
            }
            .served-label {
                font-size: 11px;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--muted);
                font-weight: 500;
            }
            .served-tile {
                width: 72px;
                height: 72px;
                background: var(--letter-tile);
                color: var(--letter-tile-fg);
                border-radius: var(--tile-radius);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: var(--tile-font);
                font-size: 46px;
                font-weight: var(--tile-weight);
                font-variation-settings: "opsz" 144;
                box-shadow: var(--tile-shadow);
                text-transform: uppercase;
                transition:
                    transform 0.18s,
                    background 0.2s,
                    color 0.2s,
                    box-shadow 0.2s,
                    border-radius 0.2s;
            }
            .served-tile.is-empty {
                background: var(--cell-empty);
                color: var(--muted);
                box-shadow: none;
            }
            .progress {
                font-size: 12px;
                color: var(--muted);
                letter-spacing: 0.04em;
                font-variant-numeric: tabular-nums;
            }

            .overlay {
                position: absolute;
                inset: 0;
                background: color-mix(in srgb, var(--bg) 92%, transparent);
                display: none;
                align-items: center;
                justify-content: center;
                pointer-events: none;
                z-index: 10;
            }
            .overlay.show {
                display: flex;
                pointer-events: auto;
            }
            .overlay-card {
                background: var(--surface);
                border: 1.5px solid var(--border);
                border-radius: 16px;
                padding: 28px 32px;
                text-align: center;
                box-shadow: 0 14px 36px var(--shadow-card);
                display: flex;
                flex-direction: column;
                gap: 14px;
                align-items: center;
            }
            .overlay-headline {
                font-family: "Fraunces", Georgia, serif;
                font-size: 26px;
                font-weight: 600;
                letter-spacing: -0.01em;
                color: var(--ink);
            }
            .overlay-sub {
                font-size: 13px;
                color: var(--muted);
            }
            .overlay-card .btn {
                margin-top: 6px;
                font-size: 14px;
                padding: 10px 20px;
            }
        </style>
    </head>
    <body>
        <div class="app">
            <div class="top-bar">
                <div class="title">Motplot</div>
                <div class="next-section">
                    <div class="served-label">Next letter</div>
                    <div class="served-tile" id="served">—</div>
                </div>
                <div class="lives" id="lives"></div>
            </div>
            <div class="grid-area">
                <div class="grid" id="grid"></div>
                <div class="spinner" id="spinner">
                    <div class="loader-grid">
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                        <div class="loader-cell"></div>
                    </div>
                    <div class="loader-text">Generating puzzle</div>
                </div>
            </div>
            <div class="bottom-bar">
                <div class="progress" id="progress">0 / 0</div>
            </div>
            <div class="overlay" id="overlay">
                <div class="overlay-card">
                    <div class="overlay-headline" id="overlay-head">—</div>
                    <div class="overlay-sub" id="overlay-sub">—</div>
                    <button class="btn" id="overlay-btn">New puzzle</button>
                </div>
            </div>
        </div>

        <script type="module">
            import init, { Newel } from "./engine/pkg/newel_engine.js";

            const gridEl = document.getElementById("grid");
            const servedEl = document.getElementById("served");
            const livesEl = document.getElementById("lives");
            const progressEl = document.getElementById("progress");
            const spinner = document.getElementById("spinner");
            const overlay = document.getElementById("overlay");
            const overlayHead = document.getElementById("overlay-head");
            const overlaySub = document.getElementById("overlay-sub");
            const overlayBtn = document.getElementById("overlay-btn");

            let game = null;
            let cellEls = [];
            const wrongForCurrent = new Set();

            let currentSeed = null;
            let puzzleIndex = 1;

            async function loadDailyPuzzle(index) {
                const path = `puzzles/${String(index).padStart(4, "0")}.json`;
                try {
                    const resp = await fetch(path);
                    if (!resp.ok) return null;
                    const data = await resp.json();
                    const rows = data.rows;
                    const cols = data.cols;
                    // solution: array of row strings; flatten to bytes
                    const solBytes = new Uint8Array(rows * cols);
                    for (let r = 0; r < rows; r++) {
                        const line = data.solution[r];
                        for (let c = 0; c < cols; c++) {
                            solBytes[r * cols + c] = line.charCodeAt(c);
                        }
                    }
                    const cluesFlat = new Uint8Array(rows * cols);
                    for (const idx of data.clues) cluesFlat[idx] = 1;
                    const serve = new Uint32Array(data.serve_order);
                    const g = Newel.from_data(rows, cols, solBytes, cluesFlat, serve);
                    if (g) {
                        currentSeed = data.seed;
                        return g;
                    }
                } catch (_) {
                    // fall through to runtime gen
                }
                return null;
            }

            const worker = new Worker("./worker.js", { type: "module" });
            let nextReqId = 0;
            const pending = new Map();
            worker.onmessage = (e) => {
                const cb = pending.get(e.data.id);
                if (!cb) return;
                pending.delete(e.data.id);
                cb(e.data);
            };
            function generateInWorker(seed) {
                const id = ++nextReqId;
                return new Promise((resolve) => {
                    pending.set(id, resolve);
                    worker.postMessage({ id, seed: seed.toString() });
                });
            }

            function showLoading() {
                gridEl.classList.add("is-loading");
                spinner.classList.add("show");
            }
            function hideLoading() {
                gridEl.classList.remove("is-loading");
                spinner.classList.remove("show");
            }

            async function newGame() {
                showLoading();
                const seed = BigInt(Math.floor(Math.random() * 2 ** 53) || 1);
                const result = await generateInWorker(seed);
                hideLoading();

                if (result.error) {
                    overlay.classList.add("show");
                    overlayHead.textContent = "Generation failed";
                    overlaySub.textContent = "Try again.";
                    return;
                }

                if (game) game.free?.();
                game = Newel.from_data(
                    result.rows,
                    result.cols,
                    result.solution,
                    result.clues,
                    result.serve_order,
                );
                currentSeed = BigInt(result.seed);
                wrongForCurrent.clear();
                buildGrid();
                refresh();
                overlay.classList.remove("show");
                logPuzzleStart();
            }

            function gridLines(getter) {
                const rows = game.rows();
                const cols = game.cols();
                const lines = [];
                for (let r = 0; r < rows; r++) {
                    const row = [];
                    for (let c = 0; c < cols; c++) {
                        row.push(getter(r, c));
                    }
                    lines.push(row.join(" "));
                }
                return lines.join("\n");
            }

            function logPuzzleStart() {
                const rows = game.rows();
                const cols = game.cols();
                const solution = gridLines((r, c) => {
                    const k = game.cell_kind(r, c);
                    if (k === 0) return "█";
                    return String.fromCharCode(game.solution_letter(r, c)).toUpperCase();
                });
                const initial = gridLines((r, c) => {
                    const k = game.cell_kind(r, c);
                    if (k === 0) return "█";
                    if (k === 2)
                        return String.fromCharCode(game.solution_letter(r, c)).toUpperCase();
                    return ".";
                });
                const order = [];
                for (let i = 0; i < game.total_to_serve(); i++) {
                    const idx = game.serve_cell(i);
                    const r = Math.floor(idx / cols);
                    const c = idx % cols;
                    const letter = String.fromCharCode(game.serve_letter(i)).toUpperCase();
                    order.push(`  ${(i + 1).toString().padStart(2)}: (${r},${c}) -> ${letter}`);
                }
                console.log(
                    `[crossword] new puzzle (seed ${currentSeed})\n` +
                        `solution:\n${solution}\n\n` +
                        `initial (clues only):\n${initial}\n\n` +
                        `serve order:\n${order.join("\n")}`,
                );
            }

            function logPuzzleEnd(outcome) {
                const cols = game.cols();
                const remainingSteps = [];
                for (let i = game.served_count(); i < game.total_to_serve(); i++) {
                    const idx = game.serve_cell(i);
                    const r = Math.floor(idx / cols);
                    const c = idx % cols;
                    const letter = String.fromCharCode(game.serve_letter(i)).toUpperCase();
                    remainingSteps.push(
                        `  ${(i + 1).toString().padStart(2)}: (${r},${c}) -> ${letter}`,
                    );
                }
                console.log(
                    `[crossword] ${outcome} (seed ${currentSeed}) — mistakes ${game.mistakes()}/${game.max_mistakes()}\n` +
                        `remaining serve order:\n${remainingSteps.join("\n") || "  (none)"}`,
                );
            }

            function buildGrid() {
                gridEl.innerHTML = "";
                cellEls = [];
                const rows = game.rows();
                const cols = game.cols();
                const area = document.querySelector(".grid-area");
                const maxW = Math.min(area.clientWidth, area.clientHeight);
                const gap = 6;
                const cellSize = Math.floor((maxW - gap * (cols + 1)) / cols);
                const total = cellSize * cols + gap * (cols + 1);
                gridEl.style.width = total + "px";
                gridEl.style.height = cellSize * rows + gap * (rows + 1) + "px";

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const div = document.createElement("div");
                        div.className = "cell";
                        div.style.width = cellSize + "px";
                        div.style.height = cellSize + "px";
                        div.style.left = gap + c * (cellSize + gap) + "px";
                        div.style.top = gap + r * (cellSize + gap) + "px";
                        div.style.fontSize = Math.floor(cellSize * 0.5) + "px";
                        div.dataset.r = r;
                        div.dataset.c = c;
                        div.addEventListener("click", () => onTap(r, c));
                        gridEl.appendChild(div);
                        cellEls.push(div);
                    }
                }
            }

            function cellEl(r, c) {
                return cellEls[r * game.cols() + c];
            }

            function refresh() {
                const rows = game.rows();
                const cols = game.cols();
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const el = cellEl(r, c);
                        const kind = game.cell_kind(r, c);
                        const letter = game.cell_letter(r, c);
                        el.classList.remove(
                            "is-block",
                            "is-empty",
                            "is-clue",
                            "is-played",
                            "is-tappable",
                            "is-locked",
                            "is-wrong",
                        );
                        const cellIdx = r * cols + c;
                        if (kind === 0) {
                            el.classList.add("is-block");
                            el.textContent = "";
                        } else if (kind === 1 && wrongForCurrent.has(cellIdx)) {
                            el.classList.add("is-empty", "is-wrong");
                            el.textContent = "✕";
                        } else if (kind === 1) {
                            el.classList.add("is-empty");
                            el.classList.add(game.is_tappable(r, c) ? "is-tappable" : "is-locked");
                            el.textContent = "";
                        } else if (kind === 2) {
                            el.classList.add("is-clue");
                            el.textContent = String.fromCharCode(letter).toUpperCase();
                        } else {
                            el.classList.add("is-played");
                            el.textContent = String.fromCharCode(letter).toUpperCase();
                        }
                    }
                }

                const cur = game.current_letter();
                if (cur === 0) {
                    servedEl.textContent = "—";
                    servedEl.classList.add("is-empty");
                } else {
                    servedEl.textContent = String.fromCharCode(cur).toUpperCase();
                    servedEl.classList.remove("is-empty");
                }

                const max = game.max_mistakes();
                const used = game.mistakes();
                livesEl.innerHTML = "";
                for (let i = 0; i < max; i++) {
                    const h = document.createElement("div");
                    h.className = "heart" + (i < used ? " lost" : "");
                    livesEl.appendChild(h);
                }
                progressEl.textContent = `${game.served_count()} / ${game.total_to_serve()}`;

                if (game.is_won()) {
                    overlay.classList.add("show");
                    overlayHead.textContent = "Solved";
                    overlaySub.textContent = `${game.mistakes()} mistake${game.mistakes() === 1 ? "" : "s"}`;
                    if (!winLogged) {
                        logPuzzleEnd("WON");
                        winLogged = true;
                    }
                } else if (game.is_lost()) {
                    revealSolutionDebug();
                    overlay.classList.add("show");
                    overlayHead.textContent = "Out of tries";
                    overlaySub.textContent = `${game.served_count()} of ${game.total_to_serve()} placed (debug: full board revealed)`;
                    if (!loseLogged) {
                        logPuzzleEnd("LOST");
                        loseLogged = true;
                    }
                } else {
                    overlay.classList.remove("show");
                }
            }

            let winLogged = false;
            let loseLogged = false;

            function revealSolutionDebug() {
                const rows = game.rows();
                const cols = game.cols();
                const targetIdx = game.is_lost() ? game.serve_cell(game.served_count()) : -1;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const el = cellEl(r, c);
                        const k = game.cell_kind(r, c);
                        if (k === 0) continue;
                        if (k === 1) {
                            // hidden — show the solution in debug style
                            el.classList.remove("is-empty");
                            el.classList.add("is-revealed-debug");
                            const letter = game.solution_letter(r, c);
                            el.textContent = String.fromCharCode(letter).toUpperCase();
                        }
                        const idx = r * cols + c;
                        if (idx === targetIdx) {
                            el.classList.add("is-target-debug");
                        }
                    }
                }
            }

            function onTap(r, c) {
                if (!game || game.is_won() || game.is_lost()) return;
                if (game.cell_kind(r, c) !== 1) return;
                if (!game.is_tappable(r, c)) return;
                const result = game.tap(r, c);
                const el = cellEl(r, c);
                if (result === 0 || result === 2) {
                    el.classList.add("flash-good");
                    setTimeout(() => el.classList.remove("flash-good"), 240);
                    // correct tap consumes the served letter — clear any wrong marks
                    wrongForCurrent.clear();
                } else if (result === 1 || result === 3) {
                    el.classList.add("flash-bad");
                    setTimeout(() => el.classList.remove("flash-bad"), 500);
                    wrongForCurrent.add(r * game.cols() + c);
                }
                refresh();
            }

            window.addEventListener("resize", () => {
                if (game) {
                    buildGrid();
                    refresh();
                    if (game.is_lost()) revealSolutionDebug();
                }
            });

            function reset() {
                winLogged = false;
                loseLogged = false;
                overlay.classList.remove("show");
                newGame();
            }
            overlayBtn.addEventListener("click", reset);

            await init();
            reset();
        </script>
    </body>
</html>
